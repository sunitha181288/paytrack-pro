# ══════════════════════════════════════════════════════════════
# PayTrack Pro — Production Profile
# Location: backend/src/main/resources/application-prod.properties
# Railway loads this when SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────────
# Railway provides PORT — Spring reads it automatically
server.port=${PORT:8080}

# ── Database — use H2 for now (free tier) ────────────────────
# H2 in-memory is fine for portfolio demo
spring.datasource.url=jdbc:h2:mem:paytrackdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── H2 Console — disable in production ───────────────────────
spring.h2.console.enabled=false

# ── Kafka — disable in prod (no Kafka on Railway free tier) ──
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# ── Batch ─────────────────────────────────────────────────────
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# ── Security ──────────────────────────────────────────────────
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:paytrack123}
jwt.secret=${JWT_SECRET:paytrack-super-secret-key-minimum-256-bits-long-for-hs256}
jwt.expiration=86400000

# ── Logging — reduce noise in production ─────────────────────
logging.level.root=WARN
logging.level.com.paytrack=INFO