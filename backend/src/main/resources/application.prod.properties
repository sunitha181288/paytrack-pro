# Server — Railway provides PORT automatically
server.port=${PORT:8080}

# PostgreSQL — Railway injects DATABASE_URL automatically
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# update = keep existing data on restart (NEVER use create-drop in prod)
spring.jpa.hibernate.ddl-auto=update

# Run data.sql on startup (idempotent with ON CONFLICT)
spring.sql.init.data-locations=classpath:data-postgresql.sql
spring.sql.init.mode=always
spring.sql.init.platform=postgresql
spring.jpa.defer-datasource-initialization=true
# Disable H2 console
spring.h2.console.enabled=false

# Disable Kafka — no broker on Railway free tier
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Security — reads from Railway environment variables
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:paytrack123}
jwt.secret=${JWT_SECRET:paytrack-super-secret-key-minimum-256-bits-long-for-hs256}
jwt.expiration=86400000

# Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Logging — less noise in production
logging.level.root=WARN
logging.level.com.paytrack=INFO